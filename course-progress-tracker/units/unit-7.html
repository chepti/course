(function() {

        const content = {
            overview: `
                <div class="content-section" data-track-section="overview">
                    <h1>מבט על</h1>
                    <p>כולנו משתמשים כמורים באפליקציות שאחרים יצרו. למעקב אחרי משימות, לעבודה משותפת, לתיאום ולעידוד התלמידים.</p>
                    <p>אבל לפעמים חסר משהו באפליקציות המוכנות! אנחנו מגלים צורך ספציפי שאין לו מענה קיים, מענה לא מותאם לצרכינו, או - עלות גבוהה.</p>
                    <p>היכולת לקבל יישומונים קטנים מכלי בינה, מאפשרת לנו להגדיר *ולאפיין* את המוצר הרצוי, ולבנות אותו בשיחה עם הבינה, ולקיים סבבי שיפור קטנים עד שהמוצר מכיל את כל התכונות שנרצה.</p>
                    <p>יש כמה כלים שמאפשרים לקבל קוד מהבינה. ביחידה על אינטראקטיביות בלמידה כבר נגענו בקוד דרך קנבס וארטיפקטים במודלי השפה הגדולים. אבל כדי לבנות אפליקציה שכוללת גם מסד נתונים נוח, שמכילה פיצ'רים מגוונים ויש לה יכולת להציג מידע בצורה חכמה, לבצע מניפולציה על מסד הנתונים - נצטרך לעבוד עם כלים נוספים.</p>
                    <p>לאבבל או בייס44 הם כלים שמאפשרים לבנות אפליקציות נחמדות עם בינה, אני לא ממליצה בגלל שהם "גן סגור" ובסוף מגבילים את יכולת היצירה בחינם.</p>
                    <p>לעומתם, השפה שמצאתי שנותנת מענה להמון צרכים וגם מרחב פעילות וגמישות - היא אפפסקריפט. זו שפה מבית גוגל, שניתן לפתוח מתוך גליון Google Sheets. כך הגליון משמש כבסיס הנתונים, נוח לעריכה ידנית כשצריך מעבר לעבודה דרך הממשק של האפליקציה שנוצרה, שהיא בעצם מסוג HTML. אין הגבלה על כמות הפרויקטים, המשתמשים וכן הלאה.</p>
                    
                    <div class="video-container">
                        <div class="video-title">מבט על - פיתוח אפליקציה (סרטון)</div>
                        <iframe src="https://www.youtube.com/embed/xcmpU7E34AQ" allowfullscreen data-track-video="overview"></iframe>
                    </div>

                    <img src="https://i.imgur.com/jL6GOud.gif" alt="גיף מחלום למוצר" class="illustration">

                    <hr>
                    <h4>מושגים:</h4>
                    <p><strong>פרויקט אפפסקריפט</strong> - הקובץ בו נשמר הקוד. לכל פרויקט כתובת ייחודית.</p>
                    <p><strong>IDE</strong> - כלי כתיבת קוד למתכנתים. כיום משלבים בינה בפנים, כך שהקוד נבנה ע"י הבינה, אבל יש לאדם יכולת שליטה וכיוונון גבוהים יותר, וגם - אין צורך לכתוב מחדש קבצים שלמים. השינויים נערכים בקבצי הקוד רק איפה שנדרש. משמש לשפות קוד רבות.</p>
                    <p><strong>גיטהאב</strong> - פלטפורמה לשמירת פרויקטי הקוד שלנו, ניהול היסטוריית גרסאות, ושיתוף קל עם קהילת המתכנתים.</p>
                    <p><strong>אבטחה</strong> - הרשאות וסיסמאות - תמיד נעדיף לקבוע סיסמא שמאוחסנת בגליון ("בתא A2") ולא לתת אותה בקוד, שלא תיחשף.</p>
                    <p><strong>איטרציות</strong> - חזרות, פינג פונג של שיפורים כדי להגיע למוצר שלם עם התכונות שרצינו, פועלות טוב ונראות טוב.</p>
                    <p><strong>API</strong> - גישה ישירה אל יכולות של כלי בינה, בד"כ בתשלום לפי שימוש. כדי לשלב באפליקציה יכולת יצירה של תמונות למשל, נוכל לשלם לגוגל על גישה למודל ננו בננה, וכך המשתמשים שלנו יוכלו ליצור תמונות כחלק מהמסע שלהם בתוך האפליקציה שלנו (על חשבוננו).</p>
                    <p><strong>קונסול</strong> - איזור בדפדפן שמציג שגיאות - כדי להציג לוחצים על F12 במקלדת, ומחפשים ברצועה העליונה סימין של X אדום, או סימן קריאה כתום. לוחצים ומקבלים פירוט שגיאות, שכדאי להעתיק לבינה.</p>

                    <p>נכתוב שאלות לבוחן או שאלון עם בינה, ואז נבקש קוד שיכול ליצור בבת אחת את הטופס בGoogle Forms (כולל ניקוד אם נרצה!). את הקוד הזה נדביק בפרויקט אפפסקריפט ונקבל את הטופס.</p>

        let isMobileView = window.innerWidth <= 800;
        const contentArea = container.querySelector('#content-area');
        const progressIndicator = container.querySelector('.progress-indicator');

        function updateProgress() {
            const allItems = container.querySelectorAll('.main-item, .sub-item');
            const completedItems = container.querySelectorAll('.nav-item.completed');
            const percentage = allItems.length > 0 ? (completedItems.length / allItems.length) * 100 : 0;
            if (progressIndicator) progressIndicator.style.width = `${percentage}%`;
        }

        // Completion is handled by course-tracker.js

        function handleMainItemClick(e) {
            const mainItem = e.currentTarget;
            const navItem = mainItem.closest('.nav-item');
            const section = mainItem.dataset.section;
            const subItemsContainer = navItem.querySelector('.sub-items');

            // Remove active class from all items
            container.querySelectorAll('.main-item, .sub-item').forEach(item => {
                item.classList.remove('active');
            });

            // Add active class to clicked item
            mainItem.classList.add('active');

            if (subItemsContainer) {
                subItemsContainer.classList.toggle('active');
                
                // Special handling for "tools" section - open first sub-item instead of showing tools content
                if (section === 'tools') {
                    const firstSubItem = subItemsContainer.querySelector('.sub-item');
                    if (firstSubItem && subItemsContainer.classList.contains('active')) {
                        // Open sub-items container and show first sub-item content
                        setTimeout(() => {
                            const fakeEvent = { currentTarget: firstSubItem, stopPropagation: () => {} };
                            handleSubItemClick(fakeEvent);
                        }, 50);
                        return; // Don't show tools content
                    }
                }
            }

            if (content[section]) {
                const contentHTML = content[section];
                if (isMobileView) {
                    let wrapper = navItem.querySelector(':scope > .section-wrapper');
                    if (!wrapper) {
                        wrapper = document.createElement('div');
                        wrapper.className = 'section-wrapper';
                        navItem.appendChild(wrapper);
                    }
                    
                    const shouldShow = !wrapper.classList.contains('active') || wrapper.innerHTML !== contentHTML;
                    
                    container.querySelectorAll('.section-wrapper.active').forEach(w => {
                        if (w !== wrapper) w.classList.remove('active');
                    });

                    wrapper.innerHTML = contentHTML;
                    
                    if (shouldShow) {
                        setTimeout(() => wrapper.classList.add('active'), 10);
                    } else {
                        wrapper.classList.remove('active');
                    }
                } else {
                    if (contentArea) contentArea.innerHTML = contentHTML;
                }
            }
            // Initialize galleries after content is loaded
            setTimeout(() => {
                initGalleries();
            }, 200);

            // Completion is handled by course-tracker.js
        }
        
        function handleSubItemClick(e) {
            e.stopPropagation();
            const subItem = e.currentTarget;
            const section = subItem.dataset.section;
            const navItem = subItem.closest('.nav-item');

            // Remove active class from all items
            container.querySelectorAll('.main-item, .sub-item').forEach(item => {
                item.classList.remove('active');
            });

            // Add active class to clicked item and its parent main item
            subItem.classList.add('active');
            const mainNavItem = navItem.closest('.sub-items').closest('.nav-item');
            if (mainNavItem) {
                const mainItem = mainNavItem.querySelector('.main-item');
                if (mainItem) mainItem.classList.add('active');
            }

            const contentHTML = content[section];

            if (isMobileView) {
                const mainNavItem = navItem.closest('.sub-items').closest('.nav-item');
                let wrapper = mainNavItem.querySelector('.section-wrapper');
                if (!wrapper) {
                    wrapper = document.createElement('div');
                    wrapper.className = 'section-wrapper';
                    mainNavItem.appendChild(wrapper);
                }
                const shouldShow = !wrapper.classList.contains('active') || wrapper.innerHTML !== contentHTML;

                container.querySelectorAll('.section-wrapper.active').forEach(w => {
                    if (w !== wrapper) w.classList.remove('active');
                });
                
                wrapper.innerHTML = contentHTML;

                if (shouldShow) {
                     setTimeout(() => wrapper.classList.add('active'), 10);
                } else {
                    wrapper.classList.remove('active');
                }
            } else {
                if (contentArea) contentArea.innerHTML = contentHTML;
            }
            // Initialize galleries after content is loaded
            setTimeout(() => {
                initGalleries();
            }, 200);
            // Completion is handled by course-tracker.js
        }
        
        function initializeView() {
            container.querySelectorAll('.main-item').forEach(header => header.addEventListener('click', handleMainItemClick));
            container.querySelectorAll('.sub-item').forEach(header => header.addEventListener('click', handleSubItemClick));

            if (!isMobileView) {
                const overviewItem = container.querySelector('.main-item[data-section="overview"]');
                if (overviewItem) overviewItem.click();
            }
        }

        function handleResize() {
            const newIsMobile = window.innerWidth <= 800;
            if (newIsMobile !== isMobileView) {
                isMobileView = newIsMobile;
                container.querySelectorAll('.section-wrapper').forEach(w => w.remove());
                if (contentArea) contentArea.innerHTML = '';
                initializeView();
            }
        }

        // Copy button functionality
        container.addEventListener('click', function(e) {
            const copyButton = e.target.closest('.copy-button');
            if (copyButton) {
                const promptContainer = copyButton.closest('.prompt-container');
                if (promptContainer) {
                    const promptText = promptContainer.querySelector('pre').innerText;
                    navigator.clipboard.writeText(promptText).then(() => {
                        copyButton.innerHTML = '✓';
                        setTimeout(() => {
                            copyButton.innerHTML = '📋';
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy text: ', err);
                    });
                }
            }
        });

        // Initialize galleries when content is loaded
        function initGalleries() {
            // Search in both container and contentArea
            const searchArea = contentArea || container || document;
            const galleries = searchArea.querySelectorAll('.image-gallery');
            galleries.forEach(gallery => {
                const containerEl = gallery.querySelector('.gallery-container');
                const dotsContainer = gallery.querySelector('.gallery-dots');
                const images = containerEl ? containerEl.querySelectorAll('img') : [];
                const galleryId = gallery.id;
                
                if (images.length === 0) return; // Skip if no images found
                
                // Create dots
                if (dotsContainer) {
                    dotsContainer.innerHTML = '';
                    images.forEach((img, index) => {
                        const dot = document.createElement('button');
                        dot.className = 'gallery-dot' + (index === 0 ? ' active' : '');
                        dot.onclick = () => goToSlide(galleryId, index);
                        dotsContainer.appendChild(dot);
                    });
                }
                
                // Set initial position
                window[galleryId + '_current'] = 0;
                updateGallery(galleryId);
            });
        }

        // Gallery navigation functions
        window.moveGallery = function(galleryId, direction) {
            const gallery = document.getElementById(galleryId);
            if (!gallery) return;
            
            const images = gallery.querySelectorAll('.gallery-container img');
            const current = window[galleryId + '_current'] || 0;
            let newIndex = current + direction;
            
            if (newIndex < 0) newIndex = images.length - 1;
            if (newIndex >= images.length) newIndex = 0;
            
            window[galleryId + '_current'] = newIndex;
            updateGallery(galleryId);
        };

        window.goToSlide = function(galleryId, index) {
            window[galleryId + '_current'] = index;
            updateGallery(galleryId);
        };

        function updateGallery(galleryId) {
            const gallery = document.getElementById(galleryId);
            if (!gallery) return;
            
            const containerEl = gallery.querySelector('.gallery-container');
            const dots = gallery.querySelectorAll('.gallery-dot');
            const current = window[galleryId + '_current'] || 0;
            
            if (containerEl) {
                containerEl.style.transform = `translateX(-${current * 100}%)`;
            }
            
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === current);
            });
        }

        // Initialize galleries after content is loaded
        setTimeout(initGalleries, 100);

        initializeView();
        window.addEventListener('resize', handleResize);
    });
})();
