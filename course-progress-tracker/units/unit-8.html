                        </div>
                        <div style="margin: 20px 0; padding: 15px; background: #f0f7ff; border-right: 4px solid var(--primary-color); border-radius: 4px;">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold;">
                                <input type="checkbox" data-track-manual style="width: 20px; height: 20px; cursor: pointer;">
                                <span>העליתי לחומר פתוח</span>
                            </label>
                        </div>
                        <img src="https://i.imgur.com/hPNkP6F.png" alt="אילוסטרציה" class="illustration">
                    </div>`
            };

            let isMobileView = window.innerWidth <= 800;
            const contentArea = container.querySelector('#content-area');
            
            const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H6C4.9 1 4 1.9 4 3v12h2V3h10V1zm3 4H10c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H10V7h9v14z"/></svg>`;
            const checkIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
            
            // Initialize copy buttons
            function initializeCopyButtons() {
                container.querySelectorAll('.copy-button').forEach(button => {
                    if (!button.innerHTML.includes('svg')) {
                        button.innerHTML = copyIcon;
                    }
                });
            }
            
            container.addEventListener('click', function(e) {
                const copyButton = e.target.closest('.copy-button');
                if (copyButton) {
                    const promptContainer = copyButton.closest('.prompt-container');
                    if (promptContainer) {
                        const promptText = promptContainer.querySelector('pre').innerText;
                        navigator.clipboard.writeText(promptText).then(() => {
                            copyButton.innerHTML = checkIcon;
                            setTimeout(() => {
                                copyButton.innerHTML = copyIcon;
                            }, 2000);
                        }).catch(err => {
                            console.error('Failed to copy text: ', err);
                        });
                    }
                }
            });

            function handleMainItemClick(e) {
                const mainItem = e.currentTarget;
                const navItem = mainItem.closest('.nav-item');
                const section = mainItem.dataset.section;
                const subItemsContainer = navItem.querySelector('.sub-items');

                container.querySelectorAll('.main-item, .sub-item').forEach(item => item.classList.remove('active'));
                mainItem.classList.add('active');

                if (subItemsContainer) {
                    subItemsContainer.classList.toggle('active');
                }

                if (content[section]) {
                    const contentHTML = content[section];
                    if (isMobileView) {
                        let wrapper = navItem.querySelector(':scope > .section-wrapper');
                        if (!wrapper) {
                            wrapper = document.createElement('div');
                            wrapper.className = 'section-wrapper';
                            navItem.appendChild(wrapper);
                        }
                        
                        const shouldShow = !wrapper.classList.contains('active');
                        
                        container.querySelectorAll('.section-wrapper.active').forEach(w => {
                            if (w !== wrapper) w.classList.remove('active');
                        });

                        wrapper.innerHTML = contentHTML;
                        initializeCopyButtons();
                        
                        if(shouldShow) {
                            setTimeout(() => wrapper.classList.add('active'), 10);
                        } else {
                            wrapper.classList.remove('active');
                        }
                    } else {
                        if(contentArea) contentArea.innerHTML = contentHTML;
                    }
                }
            }
            
            function handleSubItemClick(e) {
                e.stopPropagation();
                const subItem = e.currentTarget;
                const section = subItem.dataset.section;
                const mainNavItem = subItem.closest('.sub-items').closest('.nav-item');
                const contentHTML = content[section];

                container.querySelectorAll('.main-item, .sub-item').forEach(item => item.classList.remove('active'));
                subItem.classList.add('active');

                if (isMobileView) {
                    let wrapper = mainNavItem.querySelector(':scope > .section-wrapper');
                    if (!wrapper) {
                        wrapper = document.createElement('div');
                        wrapper.className = 'section-wrapper';
                        mainNavItem.appendChild(wrapper);
                    }
                    const shouldShow = !wrapper.classList.contains('active');

                    container.querySelectorAll('.section-wrapper.active').forEach(w => {
                        if (w !== wrapper) w.classList.remove('active');
                    });
                    
                    wrapper.innerHTML = contentHTML;
                    initializeCopyButtons();

                    if (shouldShow) {
                         setTimeout(() => wrapper.classList.add('active'), 10);
                    } else {
                        wrapper.classList.remove('active');
                    }
                } else {
                    if(contentArea) contentArea.innerHTML = contentHTML;
                    initializeCopyButtons();
                }
            }
            
            function initializeView() {
                container.querySelectorAll('.main-item').forEach(header => header.addEventListener('click', handleMainItemClick));
                container.querySelectorAll('.sub-item').forEach(header => header.addEventListener('click', handleSubItemClick));

                if (!isMobileView) {
                    const overviewItem = container.querySelector('.main-item[data-section="overview"]');
                    if(overviewItem) overviewItem.click();
                }
            }

            function handleResize() {
                const newIsMobile = window.innerWidth <= 800;
                if(newIsMobile !== isMobileView) {
                    isMobileView = newIsMobile;
                    container.querySelectorAll('.section-wrapper').forEach(w => w.remove());
                    if(contentArea) contentArea.innerHTML = '';
                    initializeView();
                }
            }

            initializeView();
            initializeCopyButtons();
            window.addEventListener('resize', handleResize);
        });
    })();
    </script>
