<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<base href="/home/">
<title>דף הבית של חפציה</title>
<meta name="description" content="ברוכים הבאים לבית הדיגיטלי של חפציה בן ארצי — פורטפוליו אינטראקטיבי בסביבת 360.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.4/dist/lottie-player.js"></script>
<style>
:root{
  --cream:#faf3e7; --ink:#4a3826; --ink-soft:#7a6a55;
  --terra:#d97742; --terra-deep:#b95d2c; --leaf:#7a8b5c;
  --chip-bg:rgba(255,250,240,.88); --chip-border:rgba(122,106,85,.25);
  --shadow:0 8px 30px rgba(74,56,38,.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Varela Round','Heebo',sans-serif;background:var(--cream);color:var(--ink);
  user-select:none;-webkit-user-select:none;touch-action:none;
}
#pano{position:fixed;inset:0;cursor:grab}
#pano.dragging{cursor:grabbing}
#pano.add-mode{cursor:crosshair}

/* ——— אייקונים (Lucide) ——— */
.chip [data-lucide],.chip svg.lucide{width:19px;height:19px;stroke-width:2px;flex:0 0 auto}
.emoji-ic{font-size:19px;line-height:1}
.hs-ic svg.lucide{width:26px;height:26px;stroke-width:1.9px;color:var(--terra-deep)}
.hs-ic.emoji-ic{font-size:26px}
.modal-inner h2 svg.lucide{width:26px;height:26px;stroke-width:2px;color:var(--terra-deep)}
.links-list svg.lucide{width:18px;height:18px;color:var(--terra-deep);vertical-align:-3px}

/* ——— שכבת נקודות ——— */
#hotspot-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.hotspot{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  pointer-events:auto;z-index:5;
  opacity:.7;transition:opacity .2s ease;
}
.hotspot:hover{opacity:1;z-index:6}
.edit-on .hotspot{opacity:.9}
.hs-dot{
  width:52px;height:52px;border-radius:50%;
  background:var(--chip-bg);backdrop-filter:blur(8px);
  border:2px solid rgba(217,119,66,.65);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;position:relative;
  box-shadow:0 4px 18px rgba(74,56,38,.3);
  transition:transform .2s ease, border-color .2s ease;
}
.hs-dot::after{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:2px solid rgba(217,119,66,.5);
  animation:pulse 2.4s ease-out infinite;
}
@keyframes pulse{
  0%{transform:scale(.75);opacity:.9}
  70%{transform:scale(1.25);opacity:0}
  100%{transform:scale(1.25);opacity:0}
}
.hotspot:hover .hs-dot{transform:scale(1.12);border-color:var(--terra)}
.hs-label{
  background:var(--chip-bg);backdrop-filter:blur(8px);
  border:1px solid var(--chip-border);border-radius:999px;
  padding:4px 14px;font-size:14px;font-weight:500;white-space:nowrap;
  box-shadow:0 2px 10px rgba(74,56,38,.18);
  pointer-events:none;
}
.edit-on .hotspot .hs-dot{border-style:dashed;border-color:var(--leaf);cursor:move}
.edit-on .hotspot .hs-dot::after{display:none}
.hotspot.hs-selected .hs-dot{border-color:var(--terra-deep);box-shadow:0 0 0 4px rgba(217,119,66,.35)}

/* ——— שלד ממשק ——— */
.chip{
  background:var(--chip-bg);backdrop-filter:blur(10px);
  border:1px solid var(--chip-border);border-radius:999px;
  padding:9px 18px;font-size:15px;font-weight:500;color:var(--ink);
  box-shadow:0 3px 14px rgba(74,56,38,.16);
  display:inline-flex;align-items:center;gap:8px;
  cursor:pointer;border:1px solid var(--chip-border);
  font-family:inherit;transition:transform .15s ease, background .2s;
}
button.chip:hover{transform:translateY(-2px);background:#fffdf8}
#brand{
  position:fixed;top:16px;right:16px;z-index:20;cursor:default;
  font-weight:700;font-size:16px;
}
#space-nav{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:8px;
}
#space-nav .chip{padding:8px 16px;font-size:14px}
#space-nav .chip.active{background:var(--terra);color:#fff;border-color:var(--terra-deep)}
#btn-links{position:fixed;bottom:18px;right:16px;z-index:20}
#btn-contact{
  position:fixed;bottom:18px;left:16px;z-index:20;
  background:var(--terra);color:#fff;border-color:var(--terra-deep);
  font-weight:700;text-decoration:none;
}
#btn-contact:hover{background:var(--terra-deep)}

/* ——— הודעת פתיחה וטעינה ——— */
#loader{
  position:fixed;inset:0;z-index:60;background:var(--cream);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .7s ease;
}
#loader.hidden{opacity:0;pointer-events:none}
#loader .big{font-size:46px;animation:float 2.2s ease-in-out infinite;line-height:0}
#loader .big svg.lucide{width:66px;height:66px;color:var(--terra);stroke-width:1.7px}
#loader lottie-player{width:150px;height:150px}
#modal-close svg.lucide,#btn-close-panel svg.lucide{width:19px;height:19px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
#loader .title{font-size:26px;font-weight:900}
#loader .sub{color:var(--ink-soft);font-size:15px}
#hint{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:19;pointer-events:none;transition:opacity .8s ease;
  font-size:14px;
}
#hint.hidden{opacity:0}

/* ——— מודאל ——— */
#modal-backdrop{
  position:fixed;inset:0;z-index:40;background:rgba(45,32,18,.55);
  backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;
  padding:20px;
}
#modal-backdrop.open{display:flex}
#modal{
  background:var(--cream);border-radius:24px;box-shadow:var(--shadow);
  max-width:640px;width:100%;max-height:86vh;overflow:auto;
  position:relative;user-select:text;-webkit-user-select:text;
}
#modal.wide{max-width:900px}
#modal-close{
  position:absolute;top:12px;left:12px;z-index:2;
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.85);font-size:17px;color:var(--ink);
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
#modal-body{padding:0}
.modal-preview{width:100%;max-height:300px;object-fit:cover;display:block;border-radius:24px 24px 0 0}
.modal-inner{padding:26px 28px 28px}
.modal-inner h2{font-size:24px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.modal-inner p{color:var(--ink-soft);font-size:16px;line-height:1.7;white-space:pre-wrap}
.modal-cta{
  display:inline-flex;align-items:center;gap:8px;margin-top:18px;
  background:var(--terra);color:#fff;border:2px solid var(--terra-deep);
  border-radius:999px;padding:13px 30px;font-weight:900;text-decoration:none;
  font-size:17px;box-shadow:0 6px 18px rgba(217,119,66,.45);
  transition:transform .15s ease, box-shadow .2s, background .2s;
}
.modal-cta:hover{background:var(--terra-deep);transform:translateY(-2px);box-shadow:0 9px 24px rgba(185,93,44,.5)}
.modal-frame{width:100%;aspect-ratio:16/9;border:none;display:block;border-radius:24px 24px 0 0;background:#000}
.modal-video{width:100%;max-height:60vh;display:block;border-radius:24px 24px 0 0;background:#000}
.modal-lottie{width:100%;height:340px;display:block;background:linear-gradient(180deg,#fff7ea,#f4e7cf);border-radius:24px 24px 0 0}
.links-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin-top:14px}
.links-list .group{font-weight:900;font-size:17px;margin-top:12px;color:var(--ink)}
.links-list a,.links-list .noaction{
  display:flex;gap:10px;align-items:baseline;text-decoration:none;color:var(--ink);
  padding:9px 12px;border-radius:14px;background:rgba(255,255,255,.6);
  border:1px solid var(--chip-border);
}
.links-list a:hover{background:#fff}
.links-list small{color:var(--ink-soft)}

/* ——— אדמין ——— */
#admin-bar{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:25;display:none;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;
  max-width:94vw;
}
#admin-bar .chip{font-size:14px;padding:8px 14px}
#admin-bar.show{display:flex}
#admin-bar .chip.on{background:var(--leaf);color:#fff}
#btn-save.dirty{background:var(--terra);color:#fff;animation:beat 1.6s infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#edit-hint{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:24;
  font-size:13px;pointer-events:none;display:none;
}
#edit-hint.show{display:block}

#edit-panel,#space-panel{
  position:fixed;top:0;right:0;height:100%;width:340px;max-width:92vw;z-index:45;
  background:var(--cream);box-shadow:-6px 0 30px rgba(74,56,38,.3);
  transform:translateX(105%);transition:transform .3s ease;
  overflow:auto;user-select:text;-webkit-user-select:text;
  display:flex;flex-direction:column;
}
#edit-panel.open,#space-panel.open{transform:translateX(0)}
.panel-top{
  position:sticky;top:0;z-index:3;background:var(--cream);
  padding:18px 20px 12px;border-bottom:1px solid var(--chip-border);
}
.panel-head{font-size:18px;font-weight:900;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.panel-head button{border:none;background:none;cursor:pointer;color:var(--ink-soft);padding:4px}
.panel-head button svg.lucide{width:20px;height:20px}
.panel-body{padding:6px 20px 40px}
#edit-panel label,#space-panel label{display:block;font-size:13px;font-weight:700;margin:12px 0 4px;color:var(--ink-soft)}
#edit-panel input[type=text],#edit-panel input[type=url],#edit-panel input[type=number],
#edit-panel textarea,#edit-panel select,
#space-panel input[type=text],#space-panel input[type=url]{
  width:100%;border:1px solid var(--chip-border);border-radius:12px;
  padding:9px 12px;font-family:inherit;font-size:15px;background:#fffdf8;color:var(--ink);
}
#edit-panel textarea{min-height:84px;resize:vertical}
#edit-panel .row,#space-panel .row{display:flex;gap:10px;align-items:center}
#edit-panel .row>div,#space-panel .row>div{flex:1}
.type-hint{font-size:12px;color:var(--ink-soft);margin-top:4px;line-height:1.5}
.panel-actions{display:flex;gap:10px}
.panel-actions .chip{justify-content:center}
#btn-done,#btn-done-space{flex:1}
#btn-delete,#btn-delete-space{background:#fbe9e2;color:#a33c14;border-color:#e7b8a4;flex:0 0 auto}
#btn-delete:hover,#btn-delete-space:hover{background:#f6d9cc}
.linkbtn{background:none;border:none;color:var(--terra-deep);font-family:inherit;font-size:13px;
  font-weight:700;cursor:pointer;padding:4px 0;margin-top:4px}
#img-extra,#sp-extra{display:none;margin-top:8px}
#img-extra.show,#sp-extra.show{display:block}
#img-extra .chip,#sp-extra .chip{flex:0 0 auto;font-size:14px;padding:8px 14px}

/* מקטעי הפאנל לפי סוג */
.kind-card,.kind-room,.kind-videowall{display:none}
#edit-panel[data-kind="card"] .kind-card{display:block}
#edit-panel[data-kind="room"] .kind-room{display:block}
#edit-panel[data-kind="videowall"] .kind-videowall{display:block}

/* הדבקת/גרירת תמונה — קומפקטי */
#paste-zone,#sp-paste{
  border:2px dashed var(--chip-border);border-radius:12px;padding:10px 12px;
  text-align:center;font-size:13px;color:var(--ink-soft);cursor:pointer;
  background:#fffdf8;transition:border-color .2s,color .2s;
}
#paste-zone:focus,#paste-zone.drag,#sp-paste:focus,#sp-paste.drag{outline:none;border-color:var(--terra);color:var(--terra-deep);background:#fff7ee}
#img-preview,#sp-preview{margin-top:8px}
#img-preview img,#sp-preview img{max-width:100%;max-height:140px;object-fit:contain;border-radius:12px;display:block;box-shadow:0 2px 10px rgba(74,56,38,.18)}
#img-preview .rm,#sp-preview .rm{margin-top:6px;font-size:12px;color:#a33c14;cursor:pointer;background:none;border:none;font-family:inherit}

/* תגית קטגוריה */
.badge{
  display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;
  padding:4px 12px;border-radius:999px;margin-bottom:10px;
  color:var(--c,#7a6a55);
  background:color-mix(in srgb, var(--c,#7a6a55) 14%, transparent);
  border:1px solid color-mix(in srgb, var(--c,#7a6a55) 34%, transparent);
}
.badge svg.lucide{width:15px;height:15px}
.card-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.card-meta .badge{margin-bottom:0}
.card-date{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--ink-soft);font-weight:500}
.card-date svg.lucide{width:14px;height:14px}

/* מדיה בכרטיס */
.card-embed{width:100%;aspect-ratio:16/9;border:none;border-radius:14px;margin-top:14px;background:#000}
.cta-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.cta-row .modal-cta{margin-top:0}
.cta-row button.modal-cta{font-family:inherit;cursor:pointer}
.cta-kids{background:var(--leaf);border-color:#5f6f45;box-shadow:0 6px 18px rgba(122,139,92,.4)}
.cta-kids:hover{background:#5f6f45;box-shadow:0 9px 24px rgba(95,111,69,.5)}

/* כרטיס עם תמונה — פריסה של תמונה מוכלת בצד + טקסט בצד השני */
.card-split{display:flex;align-items:stretch}
.card-media-col{
  flex:0 0 42%;max-width:42%;
  background:linear-gradient(160deg,#fff7ea,#f1e2c6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;
}
.card-media-col .card-img{
  width:100%;height:auto;max-height:70vh;object-fit:contain;display:block;
  border-radius:12px;box-shadow:0 4px 16px rgba(74,56,38,.18);background:#fff;
}
.card-body-col{flex:1 1 auto;min-width:0}
@media (max-width:640px){
  .card-split{flex-direction:column}
  .card-media-col{flex-basis:auto;max-width:100%;max-height:42vh;padding:16px}
  .card-media-col .card-img{max-height:38vh}
}

/* מדיה עליונה (וידאו/לוטי בלי תמונה) */
.card-topmedia{display:block}

/* רשימת קישורים */
.links-head{display:flex;align-items:center;gap:8px;margin:16px 0 6px}
.links-list .link-item{cursor:pointer}

/* כרטיסי סטטיסטיקה (מספרים גדולים) */
.stat-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px}
.stat{flex:1 1 92px;min-width:92px;text-align:center;background:rgba(255,255,255,.62);
  border:1px solid var(--chip-border);border-radius:16px;padding:13px 10px}
.stat-num{font-size:30px;font-weight:900;color:var(--terra-deep);line-height:1;font-variant-numeric:tabular-nums}
.stat-unit{font-size:13px;color:var(--ink-soft);margin-top:5px}

/* עורך סטטיסטיקות בפאנל */
.stat-edit-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.stat-edit-row .st-val{flex:0 0 76px}
.stat-edit-row .st-lab{flex:1}
.stat-edit-row .st-rm{border:none;background:#fbe9e2;color:#a33c14;border-radius:8px;
  width:32px;height:34px;cursor:pointer;flex:0 0 auto;font-family:inherit}
#btn-add-stat{margin-top:4px;font-size:13px;padding:6px 14px}

/* היררכיית נקודות */
.tier-small .hs-dot{width:36px;height:36px;font-size:18px}
.tier-small .hs-ic svg.lucide{width:19px;height:19px}
.tier-small .hs-ic.emoji-ic{font-size:18px}
.tier-small .hs-label{font-size:12px;padding:2px 10px}
.hs-title{
  background:var(--chip-bg);backdrop-filter:blur(8px);
  border:1px solid var(--chip-border);border-radius:14px;
  padding:7px 18px;font-size:20px;font-weight:900;white-space:nowrap;letter-spacing:-.01em;
  box-shadow:0 3px 14px rgba(74,56,38,.2);cursor:pointer;
  display:flex;align-items:center;gap:8px;color:var(--ink);
}
.hs-title svg.lucide{width:20px;height:20px;color:var(--terra-deep)}
.hs-title .emoji-ic{font-size:20px}
.edit-on .hotspot.tier-title .hs-title{border-style:dashed;border-color:var(--leaf);cursor:move}

/* אב-ילד: תג ספירת ילדים על נקודת-האב */
.hs-kids{
  position:absolute;top:-7px;left:-7px;min-width:21px;height:21px;padding:0 5px;
  border-radius:999px;background:var(--terra);color:#fff;font-size:12px;font-weight:900;
  display:flex;align-items:center;justify-content:center;line-height:1;
  box-shadow:0 2px 6px rgba(0,0,0,.28);border:2px solid var(--cream);z-index:2;
}
.hotspot.expanded .hs-kids{background:var(--terra-deep)}
.hs-title{position:relative}
/* סימון קשר בזמן עריכה (הורה⇄ילדים) */
.hotspot.hs-related .hs-dot,.hotspot.hs-related .hs-title{outline:3px dashed var(--leaf);outline-offset:3px}
/* הופעת ילדים */
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.hotspot.child-anim{animation:popIn .28s ease-out}

/* עורך קשרים בפאנל */
#parent-box,#children-box{display:none}
#children-list{display:flex;flex-wrap:wrap;gap:6px}
.child-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.7);
  border:1px solid var(--chip-border);border-radius:999px;padding:4px 6px 4px 12px;font-size:13px;cursor:pointer}
.child-chip .det{border:none;background:#fbe9e2;color:#a33c14;border-radius:50%;width:20px;height:20px;cursor:pointer;font-family:inherit;line-height:1}

/* ——— טוסט ——— */
#toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-16px);
  z-index:70;background:var(--ink);color:#fff;border-radius:999px;
  padding:10px 22px;font-size:14px;opacity:0;pointer-events:none;
  transition:opacity .3s ease, transform .3s ease;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:#a33c14}

/* ——— מעבר בין חללים ——— */
#fade{
  position:fixed;inset:0;z-index:30;background:var(--cream);
  opacity:0;pointer-events:none;transition:opacity .45s ease;
}
#fade.on{opacity:1;pointer-events:auto}

@media (max-width:640px){
  #brand{font-size:14px;padding:8px 14px}
  #space-nav{top:auto;bottom:68px}
  .hs-dot{width:46px;height:46px;font-size:22px}
  .hs-label{font-size:12.5px;padding:3px 11px}
  #btn-links span.txt,#btn-contact span.txt{display:none}
  #btn-links,#btn-contact{padding:11px 14px}
  #admin-bar{bottom:120px}
  #edit-hint{bottom:170px}
}
</style>
</head>
<body>

<div id="pano"></div>
<div id="hotspot-layer"></div>
<div id="fade"></div>

<div id="brand" class="chip"><i data-lucide="house"></i> דף הבית של חפציה</div>
<nav id="space-nav"></nav>

<button id="btn-links" class="chip"><i data-lucide="map"></i> <span class="txt">כל הקישורים</span></button>
<a id="btn-contact" class="chip" href="#" target="_blank" rel="noopener"><i data-lucide="message-circle"></i> <span class="txt">ממהרים? דברו איתי</span></a>

<div id="hint" class="chip hidden"><i data-lucide="move"></i> גררו כדי להסתכל מסביב</div>

<div id="loader">
  <div class="big"><i data-lucide="house"></i></div>
  <div class="title">דף הבית של חפציה</div>
  <div class="sub">רק רגע, מסדרים את הכריות על הספה...</div>
</div>

<script>
'use strict';

// ————————————————— מצב גלובלי —————————————————
const API = 'api.php';
let DATA = null;
let currentSpace = null;
let isAdmin = false, nonce = '', editMode = false, addMode = false, dirty = false;
let selectedHs = null;
let editingSpace = null;
let expandedParents = new Set();

// Three.js
let scene, camera, renderer, sphereMesh, texLoader;
const textures = {};          // cache לפי מזהה חלל
let videoWalls = [];
const R = 500, HS_R = 470;

// מצלמה
let lon = 0, lat = 0, fov = 75;
let isDown = false, downX = 0, downY = 0, downLon = 0, downLat = 0;
let velLon = 0, velLat = 0, moved = false;
let userInteracted = false;
let pinchDist = 0, pinchFov = 75;
let draggingHs = null, dragMoved = false;

const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
const tmpV = new THREE.Vector3();
const camDir = new THREE.Vector3();

const $ = id => document.getElementById(id);

// ————————————————— המרות קואורדינטות —————————————————
function latLonToVec(lat, lon, r) {
  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}
function vecToLatLon(v) {
  const r = v.length();
  return {
    lat: 90 - THREE.MathUtils.radToDeg(Math.acos(Math.max(-1, Math.min(1, v.y / r)))),
    lon: THREE.MathUtils.radToDeg(Math.atan2(v.z, v.x))
  };
}
function screenToLatLon(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(sphereMesh);
  return hits.length ? vecToLatLon(hits[0].point) : null;
}

// ————————————————— אייקונים —————————————————
// שדה האייקון תומך גם בשם Lucide (ASCII) וגם באימוג'י (תווים לא-ASCII)
function iconIsEmoji(s) { return !!s && /[^\x00-\x7F]/.test(s); }
function iconHTML(name, cls) {
  cls = cls || '';
  if (!name) name = 'map-pin';
  if (iconIsEmoji(name)) return `<span class="${cls} emoji-ic">${esc(name)}</span>`;
  return `<i data-lucide="${esc(name)}" class="${cls}"></i>`;
}
function drawIcons() {
  if (window.lucide && lucide.createIcons) lucide.createIcons();
}

// ————————————————— קטגוריות —————————————————
const CATEGORIES = {
  pwa:        { label: 'אפליקציית PWA', icon: 'smartphone', color: '#3b82f6' },
  appsscript: { label: 'Apps Script',   icon: 'code',       color: '#22a06b' },
  tool:       { label: 'כלי דיגיטלי',   icon: 'wand-2',     color: '#0ea5e9' },
  portfolio:  { label: 'תיק עבודות',    icon: 'briefcase',  color: '#b95d2c' },
  game:       { label: 'משחק למידה',    icon: 'gamepad-2',  color: '#8b5cf6' },
  teaching:   { label: 'חומרי הוראה',   icon: 'notebook-pen', color: '#e0913b' },
  content:    { label: 'חומר והדרכה',   icon: 'book-open',  color: '#7a8b5c' },
  family:     { label: 'פינה משפחתית',  icon: 'heart',      color: '#e05a7d' }
};
function catBadge(catKey) {
  const c = CATEGORIES[catKey];
  if (!c) return '';
  return `<span class="badge" style="--c:${c.color}"><i data-lucide="${c.icon}"></i> ${esc(c.label)}</span>`;
}

// מיפוי סכימה ישנה (type/content) לחדשה (kind + שדות)
function normalizeHotspot(hs) {
  if (!hs.kind) {
    if (hs.type === 'room') { hs.kind = 'room'; hs.target = hs.target || hs.content || ''; }
    else if (hs.type === 'videowall') { hs.kind = 'videowall'; hs.video = hs.video || hs.content || ''; }
    else {
      hs.kind = 'card';
      if (hs.type === 'link') hs.link = hs.link || hs.content || '';
      else if (hs.type === 'embed') hs.embed = hs.embed || hs.content || '';
      else if (hs.type === 'video') hs.video = hs.video || hs.content || '';
      else if (hs.type === 'lottie') hs.lottie = hs.lottie || hs.content || '';
      else if (hs.type === 'image') hs.image = hs.image || hs.content || '';
      else if (hs.content && /^https?:/i.test(hs.content)) hs.link = hs.content; // modal עם קישור
    }
  }
  if (!hs.image && hs.preview) hs.image = hs.preview;
  hs.category = hs.category || '';
  hs.tier = hs.tier || 'normal';
  hs.parent = hs.parent || '';
  hs.date = hs.date || '';
  if (!Array.isArray(hs.stats)) hs.stats = [];
  delete hs.type; delete hs.content; delete hs.preview;
  return hs;
}

// ————————————————— אתחול —————————————————
async function boot() {
  drawIcons();   // להציג את אייקון הבית במסך הטעינה מיד (לפני שהנתונים נטענים)
  try {
    const res = await fetch('data.json?ts=' + Date.now(), { cache: 'no-store' });
    DATA = await res.json();
  } catch (e) {
    $('loader').querySelector('.sub').textContent = 'שגיאה בטעינת הנתונים 😕';
    return;
  }

  DATA.spaces.forEach(s => (s.hotspots || []).forEach(normalizeHotspot));

  initThree();
  buildSpaceNav();
  buildCategorySelect();

  const contact = DATA.settings || {};
  if (contact.siteTitle) {
    document.title = contact.siteTitle;
    const brand = $('brand');
    if (brand) brand.innerHTML = '<i data-lucide="house"></i> ' + contact.siteTitle;
    const loaderTitle = $('loader') && $('loader').querySelector('.title');
    if (loaderTitle) loaderTitle.textContent = contact.siteTitle;
  }
  drawIcons();   // אייקוני הממשק הקבועים (מותג, כפתורים, טעינה)

  // ברירת מחדל וואטסאפ — משתמשים בערך מהנתונים רק אם זה קישור http(s) תקין (לא mailto ישן)
  const DEFAULT_CONTACT = 'https://wa.me/972544477081';
  $('btn-contact').href = /^https?:\/\//.test(contact.contactUrl || '') ? contact.contactUrl : DEFAULT_CONTACT;
  if (contact.contactLabel) $('btn-contact').querySelector('.txt').textContent = contact.contactLabel;

  const params = new URLSearchParams(location.search);
  const startId = params.get('space') || (DATA.settings && DATA.settings.startSpace) || DATA.spaces[0].id;
  await switchSpace(startId, true);

  $('loader').classList.add('hidden');
  $('hint').classList.remove('hidden');
  setTimeout(() => $('hint').classList.add('hidden'), 7000);

  animate();
  checkAdmin(params.has('admin'));
  // טעינה מוקדמת של שאר החללים ברקע
  DATA.spaces.forEach(s => loadTexture(s));
}

function initThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(fov, innerWidth / innerHeight, 1, 1100);
  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  $('pano').appendChild(renderer.domElement);

  const geo = new THREE.SphereGeometry(R, 64, 44);
  geo.scale(-1, 1, 1);
  sphereMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xe8d9bd }));
  scene.add(sphereMesh);

  texLoader = new THREE.TextureLoader();
  bindControls();
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function loadTexture(space) {
  if (textures[space.id]) return textures[space.id];
  textures[space.id] = new Promise(resolve => {
    texLoader.load(space.image, tex => {
      tex.minFilter = THREE.LinearFilter;
      resolve(tex);
    }, undefined, () => resolve(null));
  });
  return textures[space.id];
}

// ————————————————— חללים —————————————————
function getSpace(id) { return DATA.spaces.find(s => s.id === id); }

async function switchSpace(id, instant) {
  const space = getSpace(id);
  if (!space) return;
  const fade = $('fade');
  if (!instant) {
    fade.classList.add('on');
    await new Promise(r => setTimeout(r, 460));
  }
  const tex = space.image ? await loadTexture(space) : null;
  sphereMesh.material.dispose();
  sphereMesh.material = tex
    ? new THREE.MeshBasicMaterial({ map: tex })
    : new THREE.MeshBasicMaterial({ color: 0xe8d9bd });   // מרחב בלי תמונה עדיין
  currentSpace = space;
  lon = (typeof space.startLon === 'number') ? space.startLon : 0;
  lat = 0;
  expandedParents.clear();
  closePanel();
  buildHotspotEls();
  buildVideoWalls();
  updateSpaceNav();
  const url = new URL(location);
  url.searchParams.set('space', id);
  history.replaceState(null, '', url);
  if (!instant) setTimeout(() => fade.classList.remove('on'), 60);
}

function buildSpaceNav() {
  const nav = $('space-nav');
  nav.innerHTML = '';
  DATA.spaces.forEach(s => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = s.title;
    b.dataset.space = s.id;
    b.onclick = () => switchSpace(s.id);
    nav.appendChild(b);
  });
}
function updateSpaceNav() {
  document.querySelectorAll('#space-nav .chip').forEach(b =>
    b.classList.toggle('active', b.dataset.space === currentSpace.id));
}

// ————————————————— נקודות (DOM) —————————————————
function buildHotspotEls() {
  const layer = $('hotspot-layer');
  layer.innerHTML = '';
  currentSpace.hotspots.forEach(hs => {
    const el = document.createElement('div');
    el.className = 'hotspot tier-' + (hs.tier || 'normal');
    if (hs.tier === 'title') {
      el.innerHTML = '<div class="hs-title"></div>';
      const t = el.querySelector('.hs-title');
      t.innerHTML = (hs.icon ? iconHTML(hs.icon, 'hs-ic') + ' ' : '') + `<span>${esc(hs.title || '')}</span>`;
    } else {
      el.innerHTML = '<button class="hs-dot" aria-label=""></button><span class="hs-label"></span>';
      el.querySelector('.hs-dot').innerHTML = iconHTML(hs.icon, 'hs-ic');
      el.querySelector('.hs-label').textContent = hs.title || '';
      el.querySelector('.hs-dot').setAttribute('aria-label', hs.title || 'נקודה');
    }
    hs._el = el;
    layer.appendChild(el);

    const hit = el.querySelector('.hs-dot') || el.querySelector('.hs-title');
    // תג ספירת ילדים על נקודת-אב
    const kids = childrenOf(hs);
    if (kids.length) {
      const badge = document.createElement('span');
      badge.className = 'hs-kids';
      badge.textContent = kids.length;
      hit.appendChild(badge);
    }
    hit.addEventListener('pointerdown', e => {
      e.stopPropagation();
      if (editMode) {
        draggingHs = hs; dragMoved = false;
        hit.setPointerCapture(e.pointerId);
      }
    });
    hit.addEventListener('pointermove', e => {
      if (editMode && draggingHs === hs) {
        dragMoved = true;
        const ll = screenToLatLon(e.clientX, e.clientY);
        if (ll) { hs.lat = ll.lat; hs.lon = ll.lon; markDirty(); updateVideoWall(hs); }
      }
    });
    hit.addEventListener('pointerup', e => {
      e.stopPropagation();
      if (editMode) {
        if (!dragMoved) openPanel(hs);
        draggingHs = null;
      }
    });
    hit.addEventListener('click', e => {
      e.stopPropagation();
      if (!editMode) activateHotspot(hs);
    });
  });
  drawIcons();
  refreshHotspotVisibility();
}

function childrenOf(hs) { return currentSpace.hotspots.filter(h => h.parent === hs.id); }
function hasChildren(hs) { return currentSpace.hotspots.some(h => h.parent === hs.id); }

function refreshHotspotVisibility() {
  currentSpace.hotspots.forEach(hs => {
    if (!hs._el) return;
    let hide = false;
    if (hs.kind === 'videowall' && !editMode) hide = true;
    // ילד מוסתר בתצוגה עד שההורה נפתח (בעריכה הכל גלוי כדי למקם)
    if (!editMode && hs.parent) hide = !expandedParents.has(hs.parent);
    hs._el.style.display = hide ? 'none' : '';
    hs._el.classList.toggle('expanded', expandedParents.has(hs.id));
    if (!editMode && hs.parent && expandedParents.has(hs.parent) && !hide) {
      hs._el.classList.remove('child-anim'); void hs._el.offsetWidth; hs._el.classList.add('child-anim');
    }
  });
}

function toggleChildren(hs) {
  if (expandedParents.has(hs.id)) expandedParents.delete(hs.id);
  else expandedParents.add(hs.id);
  refreshHotspotVisibility();
}

function updateHotspotPositions() {
  if (!currentSpace) return;
  camera.getWorldDirection(camDir);
  currentSpace.hotspots.forEach(hs => {
    const el = hs._el;
    if (!el || el.style.display === 'none') return;
    tmpV.copy(latLonToVec(hs.lat, hs.lon, HS_R));
    const facing = tmpV.clone().normalize().dot(camDir);
    if (facing < 0.12) { el.style.visibility = 'hidden'; return; }
    tmpV.project(camera);
    el.style.visibility = 'visible';
    el.style.left = ((tmpV.x * 0.5 + 0.5) * innerWidth) + 'px';
    el.style.top = ((-tmpV.y * 0.5 + 0.5) * innerHeight) + 'px';
  });
}

// ————————————————— חלונות וידאו בסצנה —————————————————
function clearVideoWalls() {
  videoWalls.forEach(w => {
    scene.remove(w.mesh);
    w.mesh.geometry.dispose(); w.mesh.material.dispose();
    try { w.video.pause(); w.video.removeAttribute('src'); w.video.load(); } catch (e) {}
  });
  videoWalls = [];
}
function buildVideoWalls() {
  clearVideoWalls();
  currentSpace.hotspots.filter(h => h.kind === 'videowall' && h.video).forEach(createVideoWall);
}
function createVideoWall(hs) {
  const video = document.createElement('video');
  video.src = hs.video;
  video.crossOrigin = 'anonymous';
  video.muted = true; video.loop = true; video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.play().catch(() => {});
  const tex = new THREE.VideoTexture(video);
  const r = 440;
  const wDeg = hs.w || 30, hDeg = hs.h || 17;
  const w = 2 * r * Math.tan(THREE.MathUtils.degToRad(wDeg / 2));
  const h = 2 * r * Math.tan(THREE.MathUtils.degToRad(hDeg / 2));
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: tex })
  );
  mesh.position.copy(latLonToVec(hs.lat, hs.lon, r));
  mesh.lookAt(0, 0, 0);
  mesh.userData.hs = hs;
  scene.add(mesh);
  videoWalls.push({ mesh, video, hs });
}
function updateVideoWall(hs) {
  if (hs.kind !== 'videowall') return;
  const w = videoWalls.find(v => v.hs === hs);
  if (w) {
    w.mesh.position.copy(latLonToVec(hs.lat, hs.lon, 440));
    w.mesh.lookAt(0, 0, 0);
  }
}
function rebuildVideoWall(hs) {
  const idx = videoWalls.findIndex(v => v.hs === hs);
  if (idx > -1) {
    const w = videoWalls[idx];
    scene.remove(w.mesh); w.mesh.geometry.dispose(); w.mesh.material.dispose();
    try { w.video.pause(); } catch (e) {}
    videoWalls.splice(idx, 1);
  }
  if (hs.kind === 'videowall' && hs.video) createVideoWall(hs);
}

// ————————————————— פעולות נקודה —————————————————
function cardHasContent(hs) {
  return !!(hs.description || hs.image || hs.link || hs.embed || hs.video || hs.lottie ||
    (hs.stats && hs.stats.length));
}
function activateHotspot(hs) {
  if (hs.kind === 'room') { if (hs.target) switchSpace(hs.target); return; }
  // נקודת-אב עם תוכן משלה: פותחת כרטיס (שיכיל כפתור להצגת תת-הנקודות)
  if (hasChildren(hs) && cardHasContent(hs)) { openCard(hs); return; }
  // נקודת-אב בלי תוכן משלה: לחיצה ישר פותחת/סוגרת את תת-הנקודות
  if (hasChildren(hs)) { toggleChildren(hs); return; }
  if (hs.tier === 'title' && !cardHasContent(hs)) return; // כותרת אזור בלי תוכן — לא פותחת כלום
  openCard(hs);   // כרטיס תוכן, וגם וידאו-בסצנה (נפתח בגדול)
}

function openModal(html, wide) {
  $('modal').classList.toggle('wide', !!wide);
  $('modal-body').innerHTML = html;
  $('modal-backdrop').classList.add('open');
  drawIcons();
}
function closeModal() {
  $('modal-backdrop').classList.remove('open');
  $('modal-body').innerHTML = '';
}
$('modal-close').onclick = closeModal;
$('modal-backdrop').addEventListener('click', e => { if (e.target === $('modal-backdrop')) closeModal(); });
addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closePanel(); } });

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function toEmbedUrl(url) {
  const yt = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{6,})/);
  if (yt) return 'https://www.youtube.com/embed/' + yt[1] + '?autoplay=1&rel=0';
  const vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return 'https://player.vimeo.com/video/' + vm[1] + '?autoplay=1';
  return null;
}

// וידאו/לוטי כ-HTML של מדיה
function mediaHTML(hs) {
  let m = '';
  if (hs.video) {
    const embed = toEmbedUrl(hs.video);
    if (embed) m += `<iframe class="modal-frame" src="${esc(embed)}" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
    else m += `<video class="modal-video" src="${esc(hs.video)}" controls autoplay playsinline></video>`;
  }
  if (hs.lottie) m += `<lottie-player class="modal-lottie" src="${esc(hs.lottie)}" background="transparent" speed="1" autoplay loop></lottie-player>`;
  return m;
}

// גוף הכרטיס (טקסט): תגית, כותרת, תיאור, מספרים, הטמעה, כפתור
function cardBodyHTML(hs) {
  let b = '';
  if (hs.category || hs.date) {
    b += '<div class="card-meta">' + catBadge(hs.category) +
      (hs.date ? `<span class="card-date"><i data-lucide="calendar"></i> ${esc(hs.date)}</span>` : '') + '</div>';
  }
  b += `<h2>${iconHTML(hs.icon)} ${esc(hs.title)}</h2>`;
  if (hs.description) b += `<p>${esc(hs.description)}</p>`;
  if (hs.stats && hs.stats.length) {
    b += '<div class="stat-row">';
    hs.stats.forEach(st => {
      if (!st || (!st.value && !st.label)) return;
      b += `<div class="stat"><div class="stat-num">${esc(st.value)}</div><div class="stat-unit">${esc(st.label)}</div></div>`;
    });
    b += '</div>';
  }
  if (hs.embed) b += `<iframe class="card-embed" src="${esc(hs.embed)}" allowfullscreen></iframe>`;
  const kidCount = childrenOf(hs).length;
  if (hs.link || kidCount) {
    b += '<div class="cta-row">';
    if (hs.link) {
      const label = hs.linkLabel || 'פתחו את הפריט';
      b += `<a class="modal-cta" href="${esc(hs.link)}" target="_blank" rel="noopener">${esc(label)} ↗</a>`;
    }
    if (kidCount) {
      const open = expandedParents.has(hs.id);
      b += `<button class="modal-cta cta-kids" data-hs="${esc(hs.id)}">${open ? 'הסתרת' : 'הצגת'} ${kidCount} פריטים</button>`;
    }
    b += '</div>';
  }
  return b;
}

// כרטיס מורכב — עם תמונה: פריסת צד-בצד (תמונה מוכלת + טקסט). בלי תמונה: מדיה למעלה + טקסט.
function openCard(hs) {
  const body = cardBodyHTML(hs);
  const media = mediaHTML(hs);
  let html;
  if (hs.image) {
    html =
      `<div class="card-split">` +
        `<div class="card-media-col"><img class="card-img" src="${esc(hs.image)}" alt="">${media}</div>` +
        `<div class="card-body-col modal-inner">${body}</div>` +
      `</div>`;
    openModal(html, true);
  } else {
    html = (media ? `<div class="card-topmedia">${media}</div>` : '') + `<div class="modal-inner">${body}</div>`;
    openModal(html, !!(media || hs.embed));
  }
}

// ————————————————— שליטה במצלמה —————————————————
function bindControls() {
  const el = renderer.domElement;

  el.addEventListener('mousedown', e => {
    isDown = true; moved = false; userInteracted = true;
    downX = e.clientX; downY = e.clientY; downLon = lon; downLat = lat;
    velLon = velLat = 0;
    $('pano').classList.add('dragging');
  });
  addEventListener('mousemove', e => {
    if (!isDown || draggingHs) return;
    const f = 0.1 * (fov / 75);
    const nLon = (downX - e.clientX) * f + downLon;
    const nLat = (e.clientY - downY) * f + downLat;
    if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 4) moved = true;
    velLon = nLon - lon; velLat = nLat - lat;
    lon = nLon; lat = nLat;
  });
  addEventListener('mouseup', e => {
    if (isDown && !moved) handleTap(e.clientX, e.clientY);
    isDown = false;
    $('pano').classList.remove('dragging');
  });

  el.addEventListener('touchstart', e => {
    userInteracted = true;
    if (e.touches.length === 1) {
      isDown = true; moved = false;
      downX = e.touches[0].clientX; downY = e.touches[0].clientY;
      downLon = lon; downLat = lat; velLon = velLat = 0;
    } else if (e.touches.length === 2) {
      isDown = false;
      pinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
      pinchFov = fov;
    }
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDown && !draggingHs) {
      const f = 0.13 * (fov / 75);
      const nLon = (downX - e.touches[0].clientX) * f + downLon;
      const nLat = (e.touches[0].clientY - downY) * f + downLat;
      if (Math.abs(e.touches[0].clientX - downX) + Math.abs(e.touches[0].clientY - downY) > 6) moved = true;
      velLon = nLon - lon; velLat = nLat - lat;
      lon = nLon; lat = nLat;
    } else if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
      fov = Math.max(45, Math.min(100, pinchFov * pinchDist / d));
      camera.fov = fov; camera.updateProjectionMatrix();
    }
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (isDown && !moved && e.changedTouches.length) {
      handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
    isDown = false;
  });

  el.addEventListener('wheel', e => {
    e.preventDefault();
    userInteracted = true;
    fov = Math.max(45, Math.min(100, fov + e.deltaY * 0.04));
    camera.fov = fov; camera.updateProjectionMatrix();
  }, { passive: false });

  // הפעלת וידאו אחרי מחווה ראשונה (אם הדפדפן חסם autoplay)
  addEventListener('pointerdown', () => {
    videoWalls.forEach(w => w.video.play().catch(() => {}));
  }, { once: true });
}

function handleTap(x, y) {
  if (addMode) {
    const ll = screenToLatLon(x, y);
    if (ll) addHotspotAt(ll);
    return;
  }
  // לחיצה על חלון וידאו בסצנה
  if (!editMode && videoWalls.length) {
    const rect = renderer.domElement.getBoundingClientRect();
    ndc.x = ((x - rect.left) / rect.width) * 2 - 1;
    ndc.y = -((y - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(ndc, camera);
    const hits = raycaster.intersectObjects(videoWalls.map(w => w.mesh));
    if (hits.length) activateHotspot(hits[0].object.userData.hs);
  }
}

// ————————————————— לולאת רינדור —————————————————
function animate() {
  requestAnimationFrame(animate);
  if (!isDown && !editMode && !userInteracted) lon += 0.015;   // סיבוב עדין עד מגע ראשון
  if (!isDown && (Math.abs(velLon) > 0.01 || Math.abs(velLat) > 0.01)) {
    lon += velLon; lat += velLat;
    velLon *= 0.93; velLat *= 0.93;
  }
  lat = Math.max(-85, Math.min(85, lat));
  camera.lookAt(latLonToVec(lat, lon, 1));
  renderer.render(scene, camera);
  updateHotspotPositions();
}

async function checkAdmin(force) {
  if (!force && localStorage.getItem('home360_admin') !== '1') return;
  try {
    const res = await fetch(API + '?action=me', { credentials: 'same-origin' });
    const j = await res.json();
    if (j.admin) {
      isAdmin = true; nonce = j.nonce;
      localStorage.setItem('home360_admin', '1');
      $('admin-bar').classList.add('show');
    } else {
      localStorage.removeItem('home360_admin');
      if (force) toast('לא מחוברת כאדמין — התחברי לוורדפרס ונסי שוב', true);
    }
  } catch (e) {
    if (force) toast('שגיאה בבדיקת הרשאות', true);
  }
}

[
  ['f-title', 'title'], ['f-icon', 'icon'], ['f-desc', 'description'], ['f-date', 'date'],

  ['f-video', 'video'], ['f-lottie', 'lottie']
].forEach(([id, key]) => {
  $(id).addEventListener('input', () => {
    if (!selectedHs) return;
    selectedHs[key] = $(id).value;
    if (key === 'title' || key === 'icon') refreshDot();
    markDirty();
  });
});

// שיוך לנקודת-אב
$('f-parent').addEventListener('change', () => {
  if (!selectedHs) return;
  selectedHs.parent = $('f-parent').value;
  markDirty();
  buildHotspotEls();
  highlightRelated();
});

// העברת נקודה למרחב אחר
$('f-space').addEventListener('change', () => {
  if (!selectedHs) return;
  const targetId = $('f-space').value;
  if (targetId === currentSpace.id) return;
  const target = getSpace(targetId);
  if (!target) return;
  childrenOf(selectedHs).forEach(k => k.parent = '');   // ילדים שנשארים מתנתקים
  const i = currentSpace.hotspots.indexOf(selectedHs);
  if (i > -1) currentSpace.hotspots.splice(i, 1);
  // הסרת קיר וידאו אם יש
  const wi = videoWalls.findIndex(v => v.hs === selectedHs);
  if (wi > -1) { const w = videoWalls[wi]; scene.remove(w.mesh); w.mesh.geometry.dispose(); w.mesh.material.dispose(); try { w.video.pause(); } catch (e) {} videoWalls.splice(wi, 1); }
  target.hotspots.push(selectedHs);
  selectedHs.parent = '';   // בחלל החדש אין הורה מקושר
  markDirty();
  closePanel();
  buildHotspotEls();
  toast('הנקודה הועברה אל "' + target.title + '" ✓');
});

// עוד אפשרויות תמונה
$('img-more').onclick = () => $('img-extra').classList.toggle('show');

$('f-image').addEventListener('input', () => {
  if (!selectedHs) return;
  selectedHs.image = $('f-image').value;
  renderImgPreview();
  markDirty();
});

$('f-category').addEventListener('change', () => {
  if (!selectedHs) return;
  selectedHs.category = $('f-category').value;
  markDirty();
});

$('f-tier').addEventListener('change', () => {
  if (!selectedHs) return;
  selectedHs.tier = $('f-tier').value;
  if (selectedHs.tier !== 'small') selectedHs.parent = '';   // רק קטנה יכולה להיות ילד
  markDirty();
  buildHotspotEls();                       // המבנה משתנה (כותרת/קטן) — לבנות מחדש
  if (selectedHs._el) selectedHs._el.classList.add('hs-selected');
  updateRelationUI();
  highlightRelated();
});

// עורך המספרים הגדולים
function renderStatsEditor() {
  const box = $('stats-editor');
  box.innerHTML = '';
  if (!selectedHs) return;
  (selectedHs.stats || []).forEach((st, i) => {
    const row = document.createElement('div');
    row.className = 'stat-edit-row';
    row.innerHTML =
      `<input type="text" class="st-val" placeholder="250" value="${esc(st.value)}">` +
      `<input type="text" class="st-lab" placeholder="סרטונים" value="${esc(st.label)}">` +
      `<button type="button" class="st-rm">✕</button>`;
    row.querySelector('.st-val').addEventListener('input', e => { selectedHs.stats[i].value = e.target.value; markDirty(); });
    row.querySelector('.st-lab').addEventListener('input', e => { selectedHs.stats[i].label = e.target.value; markDirty(); });
    row.querySelector('.st-rm').addEventListener('click', () => { selectedHs.stats.splice(i, 1); renderStatsEditor(); markDirty(); });
    box.appendChild(row);

}
$('btn-add-stat').onclick = () => {
  if (!selectedHs) return;
  if (!Array.isArray(selectedHs.stats)) selectedHs.stats = [];
  selectedHs.stats.push({ value: '', label: '' });
  renderStatsEditor();
  markDirty();
};

$('f-kind').addEventListener('change', () => {
  if (!selectedHs) return;
  selectedHs.kind = $('f-kind').value;
  syncKindUI();
  markDirty();
  rebuildVideoWall(selectedHs);
  refreshHotspotVisibility();
});

$('f-room').addEventListener('change', () => {
  if (!selectedHs) return;
  selectedHs.target = $('f-room').value;
  markDirty();
});

$('f-vwurl').addEventListener('input', () => {
  if (!selectedHs) return;
  selectedHs.video = $('f-vwurl').value;
  markDirty();
});
$('f-vwurl').addEventListener('change', () => {
  if (selectedHs && selectedHs.kind === 'videowall') rebuildVideoWall(selectedHs);
});

['f-w', 'f-h'].forEach(id => {
  $(id).addEventListener('change', () => {
    if (!selectedHs) return;
    selectedHs.w = parseFloat($('f-w').value) || 30;
    selectedHs.h = parseFloat($('f-h').value) || 17;
    markDirty();
    rebuildVideoWall(selectedHs);
  });

// ——— תמונה: הדבקה / גרירה / קובץ ———
function fileToResizedDataURL(file, maxDim, quality) {
  maxDim = maxDim || 1280; quality = quality || 0.82;
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (Math.max(w, h) > maxDim) { const s = maxDim / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = fr.result;
    };
    fr.onerror = reject; fr.readAsDataURL(file);
  });
}
async function applyImageFile(file) {
  if (!selectedHs || !file || !file.type.startsWith('image/')) return;
  try {
    const data = await fileToResizedDataURL(file);
    selectedHs.image = data;
    $('f-image').value = '';
    renderImgPreview();
    markDirty();
    toast('תמונה נוספה 🖼️');
  } catch (e) { toast('לא הצלחתי לקרוא את התמונה', true); }
}
function renderImgPreview() {
  const box = $('img-preview');
  if (selectedHs && selectedHs.image) {
    box.innerHTML = `<img src="${esc(selectedHs.image)}" alt=""><button class="rm" type="button">הסירי תמונה ✕</button>`;
    box.querySelector('.rm').onclick = () => {
      selectedHs.image = '';
      $('f-image').value = '';
      renderImgPreview();
      markDirty();
    };
  } else {
    box.innerHTML = '';
  }
}
const pasteZone = $('paste-zone');
// לחיצה על המסגרת רק ממקדת אותה (לא פותחת חלון קבצים) — כדי לאפשר Ctrl+V
pasteZone.addEventListener('click', () => pasteZone.focus());
pasteZone.addEventListener('dragover', e => { e.preventDefault(); pasteZone.classList.add('drag'); });
pasteZone.addEventListener('dragleave', () => pasteZone.classList.remove('drag'));
pasteZone.addEventListener('drop', async e => {
  e.preventDefault(); pasteZone.classList.remove('drag');
  if (e.dataTransfer.files && e.dataTransfer.files[0]) await applyImageFile(e.dataTransfer.files[0]);
});
// הדבקה מכל מקום — מנתבת לפאנל הפתוח (רק אם יש תמונה בלוח)
document.addEventListener('paste', async e => {
  const items = (e.clipboardData && e.clipboardData.items) || [];
  let file = null;
  for (const it of items) { if (it.type && it.type.startsWith('image/')) { file = it.getAsFile(); break; } }
  if (!file) return;
  if (selectedHs && $('edit-panel').classList.contains('open')) { e.preventDefault(); await applyImageFile(file); }
  else if (editingSpace && $('space-panel').classList.contains('open')) { e.preventDefault(); await applySpaceImageFile(file); }
});
// כפתור נפרד לבחירת קובץ מהמחשב
$('btn-choose-file').onclick = () => $('f-file').click();
$('f-file').addEventListener('change', async () => {
  if ($('f-file').files[0]) await applyImageFile($('f-file').files[0]);
  $('f-file').value = '';
});

$('btn-delete').onclick = () => {
  if (!selectedHs) return;
  if (!confirm('למחוק את "' + (selectedHs.title || 'הנקודה') + '"?')) return;
  const doomed = selectedHs;
  childrenOf(doomed).forEach(k => k.parent = '');   // ניתוק ילדים
  const i = currentSpace.hotspots.indexOf(doomed);
  if (i > -1) currentSpace.hotspots.splice(i, 1);
  const wi = videoWalls.findIndex(v => v.hs === doomed);
  if (wi > -1) {
    const w = videoWalls[wi];
    scene.remove(w.mesh); w.mesh.geometry.dispose(); w.mesh.material.dispose();
    try { w.video.pause(); } catch (e) {}
    videoWalls.splice(wi, 1);
  }
  closePanel();
  markDirty();
  buildHotspotEls();
};

// ————————————————— ניהול מרחבים —————————————————
$('btn-space').onclick = () => openSpacePanel(currentSpace);
function slugifySpaceId(raw) {
  return String(raw || '')
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9_-]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 40);
}
function updateSlugHint(id) {
  const hint = $('sp-slug-hint');
  if (!hint) return;
  hint.textContent = id ? ('הקישור יהיה: ?space=' + id) : 'אותיות באנגלית, מספרים, מקף או קו תחתון';
}
function renameSpaceId(sp, nextId) {
  const oldId = sp.id;
  const id = slugifySpaceId(nextId);
  if (!id) return { ok: false, reason: 'empty' };
  if (id === oldId) return { ok: true, id };
  if (DATA.spaces.some(s => s.id === id)) return { ok: false, reason: 'taken' };
  sp.id = id;
  DATA.spaces.forEach(s => {
    s.hotspots.forEach(h => {
      if (h.kind === 'room' && h.target === oldId) h.target = id;
    });
  });
  if (DATA.settings && DATA.settings.startSpace === oldId) DATA.settings.startSpace = id;
  if (textures[oldId]) {
    textures[id] = textures[oldId];
    delete textures[oldId];
  }
  if (currentSpace && currentSpace.id === id) {
    const url = new URL(location);
    url.searchParams.set('space', id);
    history.replaceState(null, '', url);
  }
  return { ok: true, id };
}

$('btn-add-space').onclick = async () => {
  const suggested = slugifySpaceId(prompt('כתובת קצרה למרחב החדש (באנגלית, למשל works):', '') || '');
  let id = suggested;
  if (!id || DATA.spaces.some(s => s.id === id)) {
    id = 'sp' + Date.now().toString(36);
  }
  const sp = {
    id,
    title: 'מרחב חדש',
    image: '',
    startLon: 0,
    hotspots: []
  };
  DATA.spaces.push(sp);
  markDirty();
  buildSpaceNav();
  await switchSpace(sp.id);
  openSpacePanel(sp);
  toast(suggested && suggested === id
    ? ('מרחב חדש נוצר — הקישור: ?space=' + id)
    : 'מרחב חדש נוצר — הוסיפי תמונת רקע 360° (אפשר לערוך את הכתובת הקצרה)');
};

function openSpacePanel(sp) {
  editingSpace = sp;
  closePanel();
  $('sp-title').value = sp.title || '';
  $('sp-slug').value = sp.id || '';
  updateSlugHint(sp.id || '');
  $('sp-image').value = (sp.image && sp.image.indexOf('data:') !== 0) ? sp.image : '';
  $('sp-extra').classList.remove('show');
  renderSpacePreview();
  $('btn-delete-space').style.display = DATA.spaces.length > 1 ? '' : 'none';
  $('space-panel').classList.add('open');
}
function closeSpacePanel() {
  editingSpace = null;
  $('space-panel').classList.remove('open');
}
$('btn-close-space').onclick = closeSpacePanel;
$('btn-done-space').onclick = closeSpacePanel;

$('sp-title').addEventListener('input', () => {
  if (!editingSpace) return;
  editingSpace.title = $('sp-title').value;
  markDirty();
  buildSpaceNav();
});
$('sp-slug').addEventListener('input', () => {
  if (!editingSpace) return;
  const typed = $('sp-slug').value.toLowerCase().replace(/[^a-z0-9_-]/g, '');
  if (typed !== $('sp-slug').value) $('sp-slug').value = typed;
  updateSlugHint(slugifySpaceId(typed) || editingSpace.id);
});
$('sp-slug').addEventListener('change', () => {
  if (!editingSpace) return;
  const prev = editingSpace.id;
  const result = renameSpaceId(editingSpace, $('sp-slug').value);
  if (!result.ok) {
    $('sp-slug').value = editingSpace.id;
    updateSlugHint(editingSpace.id);
    toast(result.reason === 'taken' ? 'הכתובת כבר בשימוש במרחב אחר' : 'צריך כתובת קצרה באנגלית', true);
    return;
  }
  $('sp-slug').value = result.id;
  updateSlugHint(result.id);
  if (result.id === prev) return;
  markDirty();
  buildSpaceNav();
  toast('הכתובת עודכנה: ?space=' + result.id);
});
$('sp-image').addEventListener('input', () => {
  if (!editingSpace) return;
  setSpaceImage($('sp-image').value);
});

async function applySpaceImageFile(file) {
  if (!editingSpace || !file || !file.type.startsWith('image/')) return;
  try {
    const data = await fileToResizedDataURL(file, 4096, 0.85);   // פנורמה — רזולוציה גבוהה
    $('sp-image').value = '';
    setSpaceImage(data);
    toast('תמונת רקע נוספה 🖼️');
  } catch (e) { toast('לא הצלחתי לקרוא את התמונה', true); }
}
function setSpaceImage(url) {
  if (!editingSpace) return;
  editingSpace.image = url;
  delete textures[editingSpace.id];         // לבטל cache
  markDirty();
  renderSpacePreview();
  if (currentSpace && currentSpace.id === editingSpace.id && url) {
    loadTexture(editingSpace).then(tex => {
      if (tex && currentSpace.id === editingSpace.id) {
        sphereMesh.material.dispose();
        sphereMesh.material = new THREE.MeshBasicMaterial({ map: tex });
      }
    });
  }
}
function renderSpacePreview() {
  const box = $('sp-preview');
  if (editingSpace && editingSpace.image) {
    box.innerHTML = `<img src="${esc(editingSpace.image)}" alt=""><button class="rm" type="button">הסירי תמונה ✕</button>`;
    box.querySelector('.rm').onclick = () => { setSpaceImage(''); $('sp-image').value = ''; };
  } else {
    box.innerHTML = '';
  }
}
const spPaste = $('sp-paste');
spPaste.addEventListener('click', () => spPaste.focus());
spPaste.addEventListener('dragover', e => { e.preventDefault(); spPaste.classList.add('drag'); });
spPaste.addEventListener('dragleave', () => spPaste.classList.remove('drag'));
spPaste.addEventListener('drop', async e => {
  e.preventDefault(); spPaste.classList.remove('drag');
  if (e.dataTransfer.files && e.dataTransfer.files[0]) await applySpaceImageFile(e.dataTransfer.files[0]);
});
$('sp-more').onclick = () => $('sp-extra').classList.toggle('show');
$('sp-choose-file').onclick = () => $('sp-file').click();
$('sp-file').addEventListener('change', async () => {
  if ($('sp-file').files[0]) await applySpaceImageFile($('sp-file').files[0]);
  $('sp-file').value = '';
});
$('btn-delete-space').onclick = async () => {
  if (!editingSpace || DATA.spaces.length <= 1) return;
  if (!confirm('למחוק את המרחב "' + (editingSpace.title || '') + '" וכל הנקודות בו?')) return;
  const doomedId = editingSpace.id;
  DATA.spaces = DATA.spaces.filter(s => s.id !== doomedId);
  // ניקוי דלתות שהצביעו אליו
  DATA.spaces.forEach(s => s.hotspots.forEach(h => { if (h.kind === 'room' && h.target === doomedId) h.target = ''; }));
  delete textures[doomedId];
  closeSpacePanel();
  markDirty();
  buildSpaceNav();
  await switchSpace(DATA.spaces[0].id);
  toast('המרחב נמחק');
};

// ————————————————— טוסט —————————————————
let toastTimer = null;
function toast(msg, isErr) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

boot();
</script>
